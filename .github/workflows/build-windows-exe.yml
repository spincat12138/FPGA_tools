name: Build Windows EXE

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Build with Nuitka (${{ matrix.arch }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86
          - x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8.10"
          architecture: ${{ matrix.arch }}
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==24.3.1
          python -m pip install -r requirements-build.txt

      - name: Build environment
        run: |
          python --version
          python -c "import platform, struct; print(platform.platform()); print(str(struct.calcsize('P') * 8) + '-bit Python')"
          python -m pip freeze

      - name: Validate Python filenames
        run: |
          python -c "from pathlib import Path; bad=[str(p) for p in Path('.').rglob('*.py') if any(ord(ch)>127 for ch in str(p))]; print('Non-ASCII Python filenames:' if bad else 'Python filenames OK'); print('\n'.join(bad)); raise SystemExit(1 if bad else 0)"

      - name: Syntax check
        run: |
          python -m py_compile main.py tools_registry.py common/services.py
          python -m py_compile RBT2ATP/rbt2atp_gui.py RBT2ATP/__init__.py
          python -m py_compile RBT_Organization/core.py RBT_Organization/widget.py RBT_Organization/__init__.py
          python -m py_compile RBT_BIT_Converter/rbt2bit.py RBT_BIT_Converter/bit2rbt.py RBT_BIT_Converter/widget.py RBT_BIT_Converter/__init__.py
          python -m py_compile RBT2VCD/rbt2vcd.py RBT2VCD/widget.py RBT2VCD/__init__.py
          python -m py_compile Create_Project/create_project.py Create_Project/widget.py Create_Project/__init__.py
          python -m py_compile Config_Board_V2/usbtest_py.py Config_Board_V2/widget.py Config_Board_V2/usbtest_gui.py Config_Board_V2/__init__.py
          python -m py_compile GenerateUcf/core.py GenerateUcf/generate_ucf.py GenerateUcf/widget.py GenerateUcf/__init__.py
          python -m py_compile Extract_Testcase/extract_test_items.py Extract_Testcase/widget.py Extract_Testcase/metadata.py Extract_Testcase/__init__.py

      - name: Build EXE
        shell: pwsh
        run: |
          python -m nuitka `
            --onefile `
            --assume-yes-for-downloads `
            --windows-console-mode=disable `
            --enable-plugin=pyqt5 `
            --windows-icon-from-ico=RBT2ATP/logo.ico `
            --output-dir=dist/${{ matrix.arch }} `
            --output-filename=FPGA-tools-win7-${{ matrix.arch }}.exe `
            --include-data-files=RBT2ATP/RBT2ATPgui.ui=RBT2ATP/RBT2ATPgui.ui `
            --include-data-files=RBT2ATP/logo.ico=RBT2ATP/logo.ico `
            --include-data-files=RBT2ATP/presets.json=RBT2ATP/presets.json `
            --include-package-data=RBT2ATP `
            --include-module=RBT2ATP.rbt2atp_gui `
            --include-package=RBT2ATP `
            --include-package=RBT_Organization `
            --include-package=RBT_BIT_Converter `
            --include-package=RBT2VCD `
            --include-package=Create_Project `
            --include-package=Config_Board_V2 `
            --include-data-files=Config_Board_V2/config_board_v2.ui=Config_Board_V2/config_board_v2.ui `
            --include-package=GenerateUcf `
            --include-data-files=GenerateUcf/generate_ucf.ui=GenerateUcf/generate_ucf.ui `
            --include-data-dir=GenerateUcf/profiles=GenerateUcf/profiles `
            --include-data-dir=GenerateUcf/assets=GenerateUcf/assets `
            --include-package=Extract_Testcase `
            --include-data-dir=common/assets=common/assets `
            main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPGA-tools-win7-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}/FPGA-tools-win7-${{ matrix.arch }}.exe
          if-no-files-found: error
